syntax = "proto3";

package catalog.v1;

option go_package = "github.com/Girmex/go-ecommerce/microservices/catalog/api/proto;proto";
import "google/protobuf/empty.proto";

message Category {
  uint32 id = 1;
  string name = 2;
  uint32 parent_id = 3;
  string image_url = 4;
  int32 display_order = 5;
}

message Product {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  uint32 category_id = 4;
  string image_url = 5;
  double price = 6;
  uint32 user_id = 7;
  uint32 stock = 8;
}

message CreateCategoryRequest {
  string name = 1;
  uint32 parent_id = 2;
  string image_url = 3;
  int32 display_order = 4;
}

message UpdateCategoryRequest {
  uint32 id = 1;
  optional string name = 2;
  optional uint32 parent_id = 3;
  optional string image_url = 4;
  optional int32 display_order = 5;
}

message GetCategoryRequest {
  uint32 id = 1;
}

message ListCategoriesResponse {
  repeated Category categories = 1;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  uint32 category_id = 3;
  string image_url = 4;
  double price = 5;
  uint32 stock = 6;
}

message UpdateProductRequest {
  uint32 id = 1;
  optional string name = 2;
  optional string description = 3;
  optional uint32 category_id = 4;
  optional string image_url = 5;
  optional double price = 6;
  optional uint32 stock = 7;
}

message GetProductRequest {
  uint32 id = 1;
}

message GetSellerProductsRequest {
  uint32 user_id = 1;
}

message UpdateStockRequest {
  uint32 id = 1;
  uint32 stock = 2;
}

message ListProductsResponse {
  repeated Product products = 1;
}

// services

service CatalogService {

  // Category
  rpc CreateCategory(CreateCategoryRequest)
      returns (Category);

  rpc UpdateCategory(UpdateCategoryRequest)
      returns (Category);

  rpc DeleteCategory(GetCategoryRequest)
      returns (google.protobuf.Empty);

  rpc GetCategory(GetCategoryRequest)
      returns (Category);

  rpc ListCategories(google.protobuf.Empty)
      returns (ListCategoriesResponse);

  // Product
  rpc CreateProduct(CreateProductRequest)
      returns (Product);

  rpc UpdateProduct(UpdateProductRequest)
      returns (Product);

  rpc DeleteProduct(GetProductRequest)
      returns (google.protobuf.Empty);

  rpc GetProduct(GetProductRequest)
      returns (Product);

  rpc ListProducts(google.protobuf.Empty)
      returns (ListProductsResponse);

  rpc GetSellerProducts(GetSellerProductsRequest)
      returns (ListProductsResponse);

  rpc UpdateProductStock(UpdateStockRequest)
      returns (Product);
}