services:
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: auth_db

    ports:
      - "5434:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    container_name: auth-service

    build:
      context: .
      dockerfile: microservices/auth/Dockerfile

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      APP_NAME: Auth Service
      APP_ENV: development

      GRPC_PORT: 50051

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: auth_db
    ports:
      - "50051:50051"

volumes:
  postgres-data: